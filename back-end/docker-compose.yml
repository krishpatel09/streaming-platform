services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${STORAGE_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${STORAGE_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # --- Microservices (Natively Managed Context) ---
  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    ports:
      - "${ADMIN_PORT:-8012}:${ADMIN_PORT:-8012}"
    env_file:
      - .env
    depends_on:
      - kafka
      - redis
    environment:
      - STORAGE_USE_SSL=false
    extra_hosts:
      - "host.docker.internal:host-gateway"

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    ports:
      - "${CATALOG_PORT:-8003}:${CATALOG_PORT:-8003}"
    env_file:
      - .env
    depends_on:
      - kafka
    environment:
      - MONGO_URL=${CATALOG_MONGO_URI:-mongodb://host.docker.internal:27017}
      - MONGO_DATABASE=${CATALOG_MONGO_DB:-catalog_db}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "${AUTH_PORT:-5002}:${AUTH_PORT:-5002}"
    env_file:
      - .env
    depends_on:
      - redis
    environment:
      - PORT=${AUTH_PORT:-5002}
      - DB_HOST=host.docker.internal
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - AUTH_REDIS_HOST=redis
      - AUTH_REDIS_PORT=6379
    extra_hosts:
      - "host.docker.internal:host-gateway"

  streaming-service:
    build:
      context: .
      dockerfile: streaming-service/Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - .env
    depends_on:
      - minio
    environment:
      - STREAMING_PORT=8005
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_PUBLIC_ENDPOINT=http://localhost:9000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - .env
    depends_on:
      - admin-service
      - catalog-service
      - auth-service
    environment:
      - PORT=5001
      - ADMIN_SERVICE_URL=http://admin-service:8012
      - CATALOG_SERVICE_URL=http://catalog-service:8003
      - AUTH_SERVICE_URL=http://auth-service:5002
      - USER_SERVICE_URL=http://auth-service:5002
      - STREAMING_SERVICE_URL=http://streaming-service:8005
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
  minio_data:
